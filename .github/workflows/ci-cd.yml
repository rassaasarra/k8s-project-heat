name: CI/CD - Build and Deploy Frontend & Backend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    # Skip if commit message contains [skip ci]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PATE }}

      # ==============================
      # BUILD & PUSH FRONTEND
      # ==============================

      - name: Build Frontend Docker image
        run: |
          docker build -t raniaat12/front:${{ github.sha }} ./frontend

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Frontend image
        run: |
          docker push raniaat12/front:${{ github.sha }}

      # ==============================
      # BUILD & PUSH BACKEND
      # ==============================

      - name: Build Backend Docker image
        run: |
          docker build -t raniaat12/mono-backend:${{ github.sha }} ./backend

      - name: Push Backend image
        run: |
          docker push raniaat12/mono-backend:${{ github.sha }}

      # ==============================
      # UPDATE K8S MANIFESTS
      # ==============================

      - name: Update Frontend manifest with new image tag
        run: |
          sed -i "s|image: raniaat12/front:.*|image: raniaat12/front:${{ github.sha }}|g" k8s/frontend-deployment.yaml

      - name: Update Backend manifest with new image tag
        run: |
          sed -i "s|image: raniaat12/mono-backend:.*|image: raniaat12/mono-backend:${{ github.sha }}|g" k8s/backend-deployment.yaml

      # ==============================
      # COMMIT & PUSH UPDATED MANIFESTS
      # ==============================

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/frontend-deployment.yaml k8s/backend-deployment.yaml
          git diff --cached --quiet || git commit -m "ci: update image tags to ${{ github.sha }} [skip ci]"
          git push
