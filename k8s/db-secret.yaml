# Optional demo Secret — stores hardcoded placeholder credentials for the demo database.
# These are NOT production secrets and must NOT be used in any production environment.
# Replace all values with proper secrets management (e.g., Vault, Sealed Secrets)
# before any real deployment.
apiVersion: v1
kind: Secret

metadata:
  name: demo-db-secret

type: Opaque

stringData:
  username: postgres
  password: demo-password
  database: demo_db
