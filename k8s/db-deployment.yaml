# Optional demo database manifest — for validation completeness only.
# This PostgreSQL instance is NOT connected to the backend application.
# Do NOT inject its credentials into backend-deployment.yaml.
apiVersion: apps/v1
kind: Deployment

metadata:
  name: demo-postgres

spec:
  replicas: 1

  selector:
    matchLabels:
      app: demo-postgres

  template:
    metadata:
      labels:
        app: demo-postgres

    spec:
      containers:
        - name: demo-postgres
          image: postgres:15
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: demo-db-secret
                  key: username

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-db-secret
                  key: password

            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: demo-db-secret
                  key: database

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: demo-postgres-pvc
