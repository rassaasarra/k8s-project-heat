apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: raniaat12/front:f0cec76a1c7e71e0ccad0e91491e200379b0b1d6
          imagePullPolicy: Always
          ports:
            - containerPort: 80
