apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: raniaat12/front:6ce7b9bacc9ddc89282fe5ddfd5b5bb1b6836dc9
          imagePullPolicy: Always
          ports:
            - containerPort: 80
