apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: raniaat12/front:d4d5a591d105eaaab091ef99b99db0e683042427
          imagePullPolicy: Always
          ports:
            - containerPort: 80
