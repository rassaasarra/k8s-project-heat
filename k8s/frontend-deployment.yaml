apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: raniaat12/front:4d0a9d3486987d053c7194f36c8ee75a423dc88f
          imagePullPolicy: Always
          ports:
            - containerPort: 80
