apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: raniaat12/front:9fb6b08a042e2109572647361a988e5ff9e3223d
          imagePullPolicy: Always
          ports:
            - containerPort: 80
