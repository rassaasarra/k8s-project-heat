apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: raniaat12/front:f9f8e106ed6a760ad864bd0d8d802bc9043c0933
          imagePullPolicy: Always
          ports:
            - containerPort: 80
