apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: raniaat12/front:4692d1cfbd56494d03722268488d8f44c1f064d5
          imagePullPolicy: Always
          ports:
            - containerPort: 80
