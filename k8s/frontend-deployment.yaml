apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: raniaat12/front:a4d6301287fc6c025dce25e440d33de60abdbb57
          imagePullPolicy: Always
          ports:
            - containerPort: 80
