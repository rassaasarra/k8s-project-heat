apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: raniaat12/front:7aefaff20d4a6a5e98f5b0e0a3102f0a3f6b4268
          imagePullPolicy: Always
          ports:
            - containerPort: 80
