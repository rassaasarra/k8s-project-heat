apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: raniaat12/front:017f566eec293ecf922799a315fbc3e9dbc30ce4
          imagePullPolicy: Always
          ports:
            - containerPort: 80
