apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: raniaat12/front:4773d397caaeb7ab1b215751eab18b01b9ae22b6
          imagePullPolicy: Always
          ports:
            - containerPort: 80
