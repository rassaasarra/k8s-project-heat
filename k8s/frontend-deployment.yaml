apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: raniaat12/front:f06631a54ffec970fa21c3e7380cf8f0c126bdae
          imagePullPolicy: Always
          ports:
            - containerPort: 80
