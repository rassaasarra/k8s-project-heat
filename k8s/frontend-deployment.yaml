apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: raniaat12/front:d1586d1cd96c4ae3677ada9d440953e256070ab0
          imagePullPolicy: Always
          ports:
            - containerPort: 80
