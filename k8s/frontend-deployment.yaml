apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: raniaat12/front:30d5367b8e08968d73e113f2d46a8f7dbdd9e20d
          imagePullPolicy: Always
          ports:
            - containerPort: 80
