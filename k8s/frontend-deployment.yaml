apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: raniaat12/front:d56b6a9c6cc81b80887561a78cc6601ff9a12b75
          imagePullPolicy: Always
          ports:
            - containerPort: 80
