apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: raniaat12/front:682ce4224fbbe45f6bc9d30d0e4fbc770cb28748
          imagePullPolicy: Always
          ports:
            - containerPort: 80
