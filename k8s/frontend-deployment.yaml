apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: raniaat12/front:9b72659e1bd1bb95b411eb738a47d2c5bad77005
          imagePullPolicy: Always
          ports:
            - containerPort: 80
