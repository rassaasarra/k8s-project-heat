apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: raniaat12/front:2e5db8feda68e3f2d4d2ff628dcf259a7031c9b2
          imagePullPolicy: Always
          ports:
            - containerPort: 80
