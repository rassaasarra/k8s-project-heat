apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: raniaat12/front:34bf898db11b387326921a8b56676daf138bf0f2
          imagePullPolicy: Always
          ports:
            - containerPort: 80
