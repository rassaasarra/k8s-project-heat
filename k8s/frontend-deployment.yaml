apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: raniaat12/front:117f9095ba637273e758bf1b4bb869444d9629f7
          imagePullPolicy: Always
          ports:
            - containerPort: 80
