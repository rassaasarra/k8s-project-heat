apiVersion: apps/v1
kind: Deployment

metadata:
  name: mono-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: mono-backend

  template:
    metadata:
      labels:
        app: mono-backend

    spec:
      containers:
        - name: mono-backend
          image: raniaat12/mono-backend:d56b6a9c6cc81b80887561a78cc6601ff9a12b75
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          env:
            - name: SPRING_APPLICATION_NAME
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: SPRING_APPLICATION_NAME

            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: SERVER_PORT
