apiVersion: apps/v1
kind: Deployment

metadata:
  name: mono-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: mono-backend

  template:
    metadata:
      labels:
        app: mono-backend

    spec:
      containers:
        - name: mono-backend
          image: raniaat12/mono-backend:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          env:
            - name: APP_MODE
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: APP_MODE

            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: SERVER_PORT

            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: SPRING_PROFILES_ACTIVE
