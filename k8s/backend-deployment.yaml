apiVersion: apps/v1
kind: Deployment

metadata:
  name: mono-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: mono-backend

  template:
    metadata:
      labels:
        app: mono-backend

    spec:
      containers:
        - name: mono-backend
          image: raniaat12/mono-backend:7aefaff20d4a6a5e98f5b0e0a3102f0a3f6b4268
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          env:
            - name: SPRING_APPLICATION_NAME
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: SPRING_APPLICATION_NAME

            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: SERVER_PORT
