apiVersion: apps/v1
kind: Deployment
metadata:
  name: mono-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mono-backend
  template:
    metadata:
      labels:
        app: mono-backend
    spec:
      containers:
        - name: mono-backend
          image: raniaat12/mono-backend:latest
          ports:
            - containerPort: 8080
