apiVersion: apps/v1
kind: Deployment

metadata:
  name: mono-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: mono-backend

  template:
    metadata:
      labels:
        app: mono-backend

    spec:
      containers:
        - name: mono-backend
          image: raniaat12/mono-backend:e5073349531eeb0bed91f1442d6bedac0b14bc41
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          env:
            - name: SPRING_APPLICATION_NAME
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: SPRING_APPLICATION_NAME

            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: SERVER_PORT
