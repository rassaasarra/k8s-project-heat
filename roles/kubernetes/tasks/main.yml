---

# ==============================
# FIX APT LOCK (unattended-upgrades)
# ==============================

- name: Stop unattended-upgrades service
  service:
    name: unattended-upgrades
    state: stopped
    enabled: no
  become: yes
  ignore_errors: yes

- name: Disable apt daily timers
  shell: |
    systemctl disable --now apt-daily.timer apt-daily-upgrade.timer || true
  become: yes
  args:
    executable: /bin/bash

# ==============================
# PRÉREQUIS SYSTÈME
# ==============================

- name: Disable SWAP (temporary)
  command: swapoff -a
  become: yes

- name: Disable SWAP permanently
  replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s+.*)$'
    replace: '# \1'
  become: yes

- name: Load br_netfilter module
  modprobe:
    name: br_netfilter
    state: present
  become: yes

- name: Enable IPv4 forwarding and bridge-nf-call-iptables
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop:
    - { key: 'net.ipv4.ip_forward', value: '1' }
    - { key: 'net.bridge.bridge-nf-call-iptables', value: '1' }
  become: yes

# ==============================
# CONTAINERD
# ==============================

- name: Remove conflicting packages
  apt:
    name: [docker.io, docker-doc, docker-compose, podman, containerd]
    state: absent
  become: yes

- name: Install containerd
  apt:
    name: containerd
    state: present
    update_cache: yes
  become: yes

- name: Create containerd config directory
  file:
    path: /etc/containerd
    state: directory
  become: yes

- name: Generate default containerd config
  command: containerd config default
  register: containerd_config
  become: yes

- name: Write containerd config
  copy:
    dest: /etc/containerd/config.toml
    content: "{{ containerd_config.stdout }}"
  become: yes

- name: Enable SystemdCgroup
  replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'
  become: yes

- name: Restart containerd
  service:
    name: containerd
    state: restarted
    enabled: yes
  become: yes

- name: Check containerd socket exists
  stat:
    path: /run/containerd/containerd.sock
  register: containerd_sock
  become: yes

- name: Fail if containerd socket missing
  fail:
    msg: "containerd socket missing: containerd not running"
  when: not containerd_sock.stat.exists
  become: yes

# ==============================
# INSTALLATION KUBERNETES
# ==============================

- name: Add Kubernetes signing key
  shell: |
    mkdir -p /etc/apt/keyrings
    curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.28/deb/Release.key \
    | gpg --dearmor --yes -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  become: yes

- name: Add Kubernetes repository
  copy:
    dest: /etc/apt/sources.list.d/kubernetes.list
    content: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.28/deb/ /"
  become: yes

- name: Install kubelet kubeadm kubectl
  apt:
    name: [kubelet, kubeadm, kubectl]
    state: present
    update_cache: yes
  become: yes

- name: Hold Kubernetes packages
  command: apt-mark hold kubelet kubeadm kubectl
  become: yes

- name: Restart kubelet
  service:
    name: kubelet
    state: restarted
    enabled: yes
  become: yes

# ==============================
# MASTER SETUP (ONLY ON MASTER)
# ==============================

- name: Initialize Master
  command: >
    kubeadm init
    --pod-network-cidr=10.244.0.0/16
    --cri-socket unix:///run/containerd/containerd.sock
    --apiserver-advertise-address={{ ansible_default_ipv4.address }}
  args:
    creates: /etc/kubernetes/admin.conf
  when: k8s_role == "master"
  become: yes

- name: Setup kubeconfig for root
  when: k8s_role == "master"
  become: yes
  block:
    - name: Create .kube directory for root
      file:
        path: /root/.kube
        state: directory
        mode: '0700'

    - name: Copy admin.conf to root
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: yes
        mode: '0600'

# ==============================
# KUBECONFIG POUR USER UBUNTU
# FIX : "connection to localhost:8080 refused"
# ==============================

- name: Setup kubeconfig for ubuntu user
  shell: |
    mkdir -p /home/ubuntu/.kube
    cp /etc/kubernetes/admin.conf /home/ubuntu/.kube/config
    chown -R ubuntu:ubuntu /home/ubuntu/.kube
    chmod 700 /home/ubuntu/.kube
    chmod 600 /home/ubuntu/.kube/config
  args:
    executable: /bin/bash
  when: k8s_role == "master"
  become: yes

# ==============================
# REMOVE FLANNEL (if exists) - NON BLOQUANT
# ==============================

- name: Remove Flannel if already installed
  command: kubectl delete -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml --ignore-not-found=true --wait=false
  when: k8s_role == "master"
  become: yes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  ignore_errors: yes

# ==============================
# INSTALL CALICO (ONLY ON MASTER)
# ==============================

- name: Download Calico manifest
  get_url:
    url: https://raw.githubusercontent.com/projectcalico/calico/v3.27.3/manifests/calico.yaml
    dest: /tmp/calico.yaml
    mode: '0644'
  when: k8s_role == "master"
  become: yes

- name: Set Calico pod CIDR to 10.244.0.0/16
  replace:
    path: /tmp/calico.yaml
    regexp: '192\.168\.0\.0/16'
    replace: '10.244.0.0/16'
  when: k8s_role == "master"
  become: yes

- name: Apply Calico
  command: kubectl apply -f /tmp/calico.yaml
  register: calico_res
  when: k8s_role == "master"
  become: yes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

# ==============================
# GENERATE JOIN COMMAND (MASTER ONLY)
# ==============================

- name: Generate join command
  command: kubeadm token create --print-join-command
  register: join_cmd
  when: k8s_role == "master"
  become: yes

- name: Show join command (copy/paste for worker)
  debug:
    msg: "{{ join_cmd.stdout }}"
  when: k8s_role == "master"

# ==============================
# SERVE JOIN COMMAND VIA HTTP PORT 8000 (MASTER ONLY)
# Worker cherche : http://MASTER_IP:8000/join.sh
# ==============================

- name: Create /var/www/join directory
  file:
    path: /var/www/join
    state: directory
    mode: '0755'
  when: k8s_role == "master"
  become: yes

- name: Save join command to /var/www/join/join.sh
  copy:
    content: "{{ join_cmd.stdout }}"
    dest: /var/www/join/join.sh
    mode: '0644'
  when: k8s_role == "master"
  become: yes

- name: Create systemd service for HTTP token server
  copy:
    dest: /etc/systemd/system/k8s-token-server.service
    mode: '0644'
    content: |
      [Unit]
      Description=K8s Join Token HTTP Server
      After=network.target

      [Service]
      WorkingDirectory=/var/www/join
      ExecStart=/usr/bin/python3 -m http.server 8000
      Restart=on-failure
      RestartSec=5
      User=root

      [Install]
      WantedBy=multi-user.target
  when: k8s_role == "master"
  become: yes

- name: Enable and start k8s-token-server
  systemd:
    name: k8s-token-server
    enabled: yes
    state: started
    daemon_reload: yes
  when: k8s_role == "master"
  become: yes

- name: Wait for HTTP token server to be ready on port 8000
  wait_for:
    host: 0.0.0.0
    port: 8000
    timeout: 30
  when: k8s_role == "master"
  become: yes

- name: Confirm join.sh is accessible via HTTP
  uri:
    url: "http://{{ ansible_default_ipv4.address }}:8000/join.sh"
    method: GET
    status_code: 200
  when: k8s_role == "master"
  become: yes

  
- name: Install git
  apt:
    name: git
    state: present
    update_cache: yes
  when: k8s_role == "master"
  become: yes

- name: Clone application repository
  git:
    repo: "https://github.com/rassaasarra/k8s-project-heat.git"
    dest: /home/ubuntu/k8s-project-heat
    version: main
    force: yes
  when: k8s_role == "master"
  become: yes

- name: Fix ownership of repository
  file:
    path: /home/ubuntu/k8s-project-heat
    owner: ubuntu
    group: ubuntu
    recurse: yes
  when: k8s_role == "master"
  become: yes

- name: Deploy frontend manifests
  command: kubectl apply -f /home/ubuntu/k8s-project-heat/k8s/
  when: k8s_role == "master"
  become: yes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf


# ==============================
# GESTION AUTOMATISÉE DES SECRETS
# ==============================

- name: Générer le manifest du secret Flask
  copy:
    dest: /tmp/flask-secrets-manifest.yaml
    content: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: flask-secrets
      type: Opaque
      stringData:
        GROQ_API_KEY: "{{ groq_api_key }}"
        RESEND_API_KEY: "{{ resend_api_key }}"
  when: k8s_role == "master"
  become: yes

- name: Appliquer le secret Flask
  command: kubectl apply -f /tmp/flask-secrets-manifest.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  when: k8s_role == "master"
  become: yess
  
# ==============================
# INSTALL METALLB
# ==============================
- name: Install MetalLB
  command: kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.14.5/config/manifests/metallb-native.yaml
  when: k8s_role == "master"
  become: yes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Wait for MetalLB controller
  shell: |
    kubectl wait --namespace metallb-system \
    --for=condition=available deployment/controller \
    --timeout=180s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  when: k8s_role == "master"
  become: yes

- name: Create MetalLB config
  copy:
    dest: /tmp/metallb-config.yaml
    content: |
      apiVersion: metallb.io/v1beta1
      kind: IPAddressPool
      metadata:
        name: default-pool
        namespace: metallb-system
      spec:
        addresses:
          - 10.8.50.240-10.8.50.250
      ---
      apiVersion: metallb.io/v1beta1
      kind: L2Advertisement
      metadata:
        name: default
        namespace: metallb-system
  when: k8s_role == "master"
  become: yes

- name: Apply MetalLB config
  command: kubectl apply -f /tmp/metallb-config.yaml
  when: k8s_role == "master"
  become: yes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

# ==============================
# INSTALL NGROK
# ==============================

- name: Download ngrok
  get_url:
    url: https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
    dest: /tmp/ngrok.tgz
  when: k8s_role == "master"
  become: yes

- name: Extract ngrok
  unarchive:
    src: /tmp/ngrok.tgz
    dest: /usr/local/bin/
    remote_src: yes
    mode: '0755'
  when: k8s_role == "master"
  become: yes

- name: Configure ngrok token
  shell: |
    ngrok config add-authtoken 3DX677NOeQhEnGdK5egbkO4IdCy_2qTse2kwcfrsisKDarRpA
  when: k8s_role == "master"
  become: yes
  

# ==============================
# START NGROK FRONTEND TUNNEL
# ==============================

- name: Create ngrok systemd service
  copy:
    dest: /etc/systemd/system/ngrok-frontend.service
    mode: '0644'
    content: |
      [Unit]
      Description=Ngrok Frontend Tunnel
      After=network.target

      [Service]
      ExecStart=/usr/local/bin/ngrok http 30080
      Restart=always
      RestartSec=5
      User=root

      [Install]
      WantedBy=multi-user.target
  when: k8s_role == "master"
  become: yes

- name: Enable and start ngrok frontend
  systemd:
    name: ngrok-frontend
    enabled: yes
    state: started
    daemon_reload: yes
  when: k8s_role == "master"
  become: yes
# ==============================
# ==============================
# AUTO CD WITH ANSIBLE-PULL
# ==============================

- name: Create auto update script
  copy:
    dest: /usr/local/bin/update-cluster.sh
    mode: '0755'
    content: |
      #!/bin/bash
      # Extraction des clés depuis l'environnement système du Master
      export GROQ_API_KEY=$(grep "GROQ_API_KEY" /etc/environment | cut -d'=' -f2 | tr -d '"')
      export RESEND_API_KEY=$(grep "RESEND_API_KEY" /etc/environment | cut -d'=' -f2 | tr -d '"')

      ANSIBLE_REMOTE_TMP=/tmp/ansible ansible-pull \
      -U https://github.com/rassaasarra/k8s-project-heat.git \
      -i localhost, \
      -e "k8s_role=master" \
      -e "groq_api_key=$GROQ_API_KEY" \
      -e "resend_api_key=$RESEND_API_KEY" \
      master_setup.yml
  when: k8s_role == "master"
  become: yes

- name: Add auto update cron
  cron:
    name: "Auto update Kubernetes cluster"
    minute: "*/5"
    job: "/usr/local/bin/update-cluster.sh >> /var/log/ansible-pull.log 2>&1"
  when: k8s_role == "master"
  become: yes
